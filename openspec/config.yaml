# openspec/config.yaml — OllamaChat project configuration
# Updated by sdd-init on 2026-06-23 (v0.3.0)
schema: spec-driven

context: |
  Project: OllamaChat
  Stack: Python 3.12 (managed via UV), wxPython 4.2+, accessible-output2 0.17+, requests 2.31+
  Architecture: Desktop GUI app for Windows 11, targeting blind users via accessible-output2
  Testing: pytest (140/140 tests in v0.3.0), strict TDD on core/, AST+manual verification on ui/
  Conventions: AGENTS.md documents rules — BoxSizer only, name= on all controls, wx.CallAfter for threading, no WebView, no ruff/mypy
  Layout: ollamachat/{core,ui,data}/ — core/ is wx-free, ui/ depends on core/ and wx
  Dev environment: WSL + UV (Python 3.12), GUI cannot run locally — core tests + AST ui tests + smoke pass on WSL
  GUI verification: Manual on Windows 11 with NVDA

strict_tdd: true

testing:
  runner: pytest
  runner_command: uv run --no-sync pytest -xvs
  layers:
    unit:
      available: true
      tool: pytest (6 core test files — conversation, llama_client, llama_runner, logger, speech, text_utils)
    static_ast:
      available: true
      tool: pytest + ast (4 ui static test files — structural checks without importing wx)
    ui_runtime:
      available: true
      tool: pytest (3 ui test files — runnable on WSL, limited to non-GUI checks)
    smoke:
      available: true
      tool: pytest (1 smoke test — speech degradation when accessible_output2 is missing)
    integration:
      available: false
      tool: — (not configured; all tests are unit/static/smoke)
    e2e:
      available: false
      tool: — (manual GUI testing on Windows 11 with NVDA)
  coverage:
    available: true
    tool: pytest-cov
    command: uv run --no-sync pytest --cov
  quality:
    linter:
      available: false
      tool: — (explicitly excluded per AGENTS.md; pytest + verify cover quality)
    type_checker:
      available: false
      tool: — (explicitly excluded per AGENTS.md)
    formatter:
      available: false
      tool: — (not configured in project)

delivery:
  strategy: single-pr-default
  review_budget_lines: 800
  chain_strategy: not_applicable

execution:
  mode: auto
  artifact_store: openspec

rules:
  proposal:
    - Include rollback plan for risky changes
    - Keep scope minimal and focused on blind-user accessibility
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Accessibility requirements MUST be spec'ed from user stories
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - wxPython GUI considerations: no GUI in WSL; design for testability
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    tdd: true
    test_command: uv run --no-sync pytest -xvs
    rules:
      - Follow existing code patterns (established in AGENTS.md)
      - core/: RED-GREEN-REFACTOR strict TDD
      - ui/: AST static tests + manual verification on Windows
  verify:
    test_command: uv run --no-sync pytest -xvs
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
